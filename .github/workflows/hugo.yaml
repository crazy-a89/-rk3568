name: Build and deploy Hugo site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.163.3
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install Hugo
        shell: bash
        run: |
          curl -sL -o "${{ runner.temp }}/hugo.tar.gz" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir -p "${{ runner.temp }}/hugo"
          tar -C "${{ runner.temp }}/hugo" -xf "${{ runner.temp }}/hugo.tar.gz"
          echo "${{ runner.temp }}/hugo" >> "${GITHUB_PATH}"

      - name: Build
        shell: bash
        run: |
          set +e
          hugo --gc --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/" \
            --cacheDir "${{ runner.temp }}/hugo_cache" 2>&1 | tee hugo-build.log
          status=${PIPESTATUS[0]}
          if [[ ${status} -ne 0 ]]; then
            error=$(tail -n 20 hugo-build.log)
            error=${error//'%'/'%25'}
            error=${error//$'\n'/'%0A'}
            error=${error//$'\r'/'%0D'}
            echo "::error title=Hugo build failed::${error}"
            exit "${status}"
          fi

      - name: Upload site
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
